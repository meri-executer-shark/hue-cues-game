<!DOCTYPE html>
<html>
<head>
  <title>Hue Cues Game</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
    }

    .tile {
      width: 60px;
      height: 60px;
      display: inline-block;
      cursor: pointer;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(6, 60px);
      gap: 5px;
      justify-content: center;
      margin-top: 20px;
    }

    #chat {
      margin-top: 20px;
    }
  </style>
</head>
<body>

<h1>🎮 Hue & Cues</h1>

<input id="roomInput" placeholder="Room code">
<button onclick="joinRoom()">Join</button>

<h2 id="status"></h2>

<div id="board"></div>

<input id="msg" placeholder="chat">
<button onclick="sendChat()">Send</button>

<div id="chat"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="game.js"></script>

</body>
</html>
