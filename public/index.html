<!DOCTYPE html>
<html>
<head>
  <title>Hue & Cues Board</title>
  <style>
    body { font-family: Arial; text-align: center; }

    .board {
      display: grid;
      grid-template-columns: repeat(6, 60px);
      gap: 5px;
      justify-content: center;
      margin-top: 20px;
    }

    .tile {
      width: 60px;
      height: 60px;
      border: 2px solid black;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>Hue & Cues Board 🎨</h1>

<p>Pick a tile:</p>

<div class="board" id="board"></div>

<h2 id="result"></h2>

<script src="game.js"></script>
</body>
</html>
